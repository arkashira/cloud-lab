# /opt/axentx/clo.../.gitlab-ci.yml
stages:
  - provision
  - test
  - destroy

variables:
  TF_VAR_environment: "sandbox"
  TF_WORKSPACE: "sandbox"

before_script:
  - apk add --no-cache terraform  # Ensures Terraform is available in all stages
  - terraform init -backend=false  # Initialize Terraform once

provision:
  stage: provision
  image: hashicorp/terraform:1.5.0  # Explicit version for consistency
  script:
    - terraform apply -auto-approve
    - terraform output -json > sandbox-report.json  # Capture outputs for testing
  artifacts:
    paths:
      - sandbox-report.json
    reports:
      junit: sandbox-report.json  # Enable JUnit reporting
    expire_in: 1 hour  # Clean up artifacts after 1 hour
  when: on_success

test:
  stage: test
  image: python:3.12-slim  # Lightweight Python image for testing
  script:
    - echo "Running integration tests against the sandbox..."
    - python -m pytest --junitxml=sandbox-report.xml  # Example test command (replace with actual tests)
  needs: [provision]  # Explicit dependency on provision
  dependencies: [provision]  # Ensure artifacts are available
  artifacts:
    reports:
      junit: sandbox-report.xml  # Test results in JUnit format
    expire_in: 1 hour
  when: on_success

destroy:
  stage: destroy
  image: hashicorp/terraform:1.5.0
  script:
    - terraform destroy -auto-approve
  needs: [test]  # Only destroy after tests pass
  when: on_success