stages:
  - provision
  - test
  - destroy

variables:
  # Ensure the script can find kubectl and jq in the container
  PATH: "/usr/local/bin:/usr/bin:/bin"

provision:
  stage: provision
  image: hashicorp/terraform:1.5
  script:
    - terraform init
    - terraform apply -auto-approve
  artifacts:
    paths:
      - sandbox-report.json
    reports:
      junit: junit.xml

test:
  stage: test
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl jq bash
    - apk add --no-cache kubectl
  script:
    - chmod +x scripts/test.sh
    - scripts/test.sh
  artifacts:
    paths:
      - sandbox-report.json
    reports:
      junit: junit.xml

destroy:
  stage: destroy
  image: hashicorp/terraform:1.5
  script:
    - terraform destroy -auto-approve
  when: always