- name: Install Apache
  apt:
    name: "{{ apache_pkg }}"
    state: present
    update_cache: yes
  when: ansible_os_family == 'Debian'
  register: apache_install

- name: Install Apache (RedHat)
  yum:
    name: "{{ apache_pkg }}"
    state: present
  when: ansible_os_family == 'RedHat'
  register: apache_install

- name: Ensure Apache is running
  service:
    name: "{{ apache_pkg }}"
    state: started
    enabled: true

- name: Deploy index.html
  copy:
    dest: /var/www/html/index.html
    content: |
      <html><body><h1>Welcome to {{ inventory_hostname }}</h1></body></html>
  notify: restart apache