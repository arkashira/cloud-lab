# ------------------------------------------------------------
# Default GitLab Runner configuration for the sandbox environment.
# This file is used as a base when the register_runners.sh script
# performs a non‑interactive registration.
# ------------------------------------------------------------

concurrent = 4
check_interval = 0

[session_server]
  session_timeout = 1800

[[runners]]
  name = "sandbox-runner"
  url = "https://gitlab.example.com/"
  token = ""                # Filled in automatically by the registration command
  executor = "docker"
  [runners.docker]
    tls_verify = false
    image = "alpine:latest"
    privileged = true
    disable_entrypoint_overwrite = false
    oom_kill_disable = false
    disable_cache = false
    volumes = ["/cache"]
    shm_size = 0
  [runners.cache]
    Type = "s3"
    Path = "cache"
    Shared = true