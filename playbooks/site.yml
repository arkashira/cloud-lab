---
- name: Bootstrap Control Node
  hosts: localhost
  connection: local
  become: yes
  tasks:
    - name: Ensure Python3 and pip are installed
      apt:
        name:
          - python3
          - python3-pip
        state: present
        update_cache: yes

    - name: Ensure Ansible is installed via pip (latest version)
      pip:
        name: ansible
        state: present