---
- name: Install Nginx
  apt:
    name: nginx
    state: present
  when: ansible_os_family == 'Debian'

- name: Start and enable Nginx
  service:
    name: nginx
    state: started
    enabled: yes

- name: Deploy default Nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
  notify: restart nginx

- name: Ensure web root exists
  file:
    path: /var/www/html
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Deploy index.html
  copy:
    content: |
      <!DOCTYPE html>
      <html>
      <head><title>Cloud Lab</title></head>
      <body><h1>🚀 Welcome to Cloud Lab</h1></body>
      </html>
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: '0644'
  notify: reload nginx