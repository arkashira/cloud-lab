---
- name: Configure all servers
  hosts: all
  become: yes
  gather_facts: yes

  roles:
    - common
    - webserver
    - database

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == 'Debian'

  post_tasks:
    - name: Ensure SSH service is running
      service:
        name: ssh
        state: started
        enabled: yes