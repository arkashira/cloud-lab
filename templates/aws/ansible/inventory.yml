
all:
  hosts:
    web:
      ansible_access_key: <access_key>
      ansible_secret_key: <secret_key>
      ansible_region: us-west-2
      ansible_instance_type: t2.micro
      ansible_ssh_user: ubuntu
      ansible_ssh_private_key_file: ~/.ssh/id_rsa
      vars:
        instance_ami: ami-0abcdef1234567890

    app:
      ansible_access_key: <access_key>
      ansible_secret_key: <secret_key>
      ansible_region: us-west-2
      ansible_instance_type: t2.micro
      ansible_ssh_user: ubuntu
      ansible_ssh_private_key_file: ~/.ssh/id_rsa
      vars:
        instance_ami: ami-0abcdef1234567890

---

# /opt/axentx/cloud-lab/templates/aws/ansible/ansible.cfg

[defaults]
inventory = /opt/axentx/cloud-lab/templates/aws/ansible/inventory.yml

[ec2]
ansible_python_interpreter = /usr/bin/python3

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no

[privilege_escalation]
become = yes
become_method = sudo